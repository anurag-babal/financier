# Server Configuration
server.port=8080

# Spring Application Name
spring.application.name=api-gateway

# Eureka Client Configuration (for service discovery)
# This gateway will register itself with Eureka to find other services
eureka.client.serviceUrl.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka}
eureka.instance.prefer-ip-address=true

# Spring Cloud Gateway Route Configuration
# We use the 'lb' (load balancer) protocol to let Eureka resolve the service location
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# --- Default CORS Configuration (Reactive) ---
spring.cloud.gateway.globalcors.add-to-simple-url-handler-mapping=true
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=http://localhost:3000
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,OPTIONS,PUT,DELETE,PATCH
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true

# JWT Configuration
jwt.secret=someLongAndSecureSecretKeyThatIsAtLeast256BitsLongForHS256
jwt.expiration.ms=86400000

# --- Route Definitions ---

# Route for User Service Authentication
spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=lb://user-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/user-service/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=1

# Route for Expense Service
spring.cloud.gateway.routes[1].id=expense-service
spring.cloud.gateway.routes[1].uri=lb://expense-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/expense-service/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=1

# Route for Budget Service
spring.cloud.gateway.routes[2].id=budget-service
spring.cloud.gateway.routes[2].uri=lb://budget-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/budget-service/**
spring.cloud.gateway.routes[2].filters[0]=StripPrefix=1
