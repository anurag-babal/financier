# Docker Compose file for running the Financier application in a local development environment.
# Version '3.8' is a modern and stable version of the Docker Compose file format.
# version: "3.8"

services:
  #----------------------------------------------------#
  #  INFRASTRUCTURE SERVICES
  #----------------------------------------------------#
  service-registry:
    build:
      context: ./infrastructure/service-registry
    container_name: service-registry
    ports:
      - "${FINANCIER_REGISTRY_PORT}:8761"
    networks:
      - financier-net

  api-gateway:
    build:
      context: ./infrastructure/api-gateway
    container_name: api-gateway
    ports:
      - "${FINANCIER_GATEWAY_PORT}:8080"
    depends_on:
      - service-registry
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://${EUREKA_HOST}:8761/eureka
      - JWT_SECRET=${JWT_SECRET}
      - ALLOWED_ORIGIN=${ALLOWED_ORIGIN}
    networks:
      - financier-net

  message-broker:
    image: rabbitmq:3.9-management
    container_name: message-broker
    ports:
      - "${RABBITMQ_PORT}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT}:15672"
    networks:
      - financier-net

  #----------------------------------------------------#
  #  DATABASES
  #----------------------------------------------------#
  user-db:
    image: postgres:14
    container_name: user-db
    ports:
      - "${POSTGRES_PORT}:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - user-db-data:/var/lib/postgresql/data
    networks:
      - financier-net

  transaction-db:
    image: postgres:14
    container_name: transaction-db
    ports:
      - "${TRANSACTION_POSTGRES_PORT}:5432"
    environment:
      - POSTGRES_USER=${TRANSACTION_POSTGRES_USER}
      - POSTGRES_PASSWORD=${TRANSACTION_POSTGRES_PASSWORD}
      - POSTGRES_DB=${TRANSACTION_POSTGRES_DB}
    volumes:
      - transaction-db-data:/var/lib/postgresql/data
    networks:
      - financier-net

  #----------------------------------------------------#
  #  BACKEND SERVICES
  #----------------------------------------------------#
  user-service:
    build:
      context: ./services/user-service
    container_name: user-service
    ports:
      - "${FINANCIER_USER_SERVICE_PORT}:8081"
    depends_on:
      - user-db
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://${EUREKA_HOST}:8761/eureka
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - financier-net

  transaction-service:
    build:
      context: ./services/transaction-service
    container_name: transaction-service
    ports:
      - "${FINANCIER_TRANSACTION_SERVICE_PORT}:8082"
    depends_on:
      - transaction-db
      - service-registry
      - message-broker
    environment:
      - PORT=${FINANCIER_TRANSACTION_SERVICE_PORT}
      - SPRING_DATASOURCE_URL=jdbc:postgresql://${TRANSACTION_POSTGRES_HOST}:${TRANSACTION_POSTGRES_PORT}/${TRANSACTION_POSTGRES_DB}
      - SPRING_DATASOURCE_USERNAME=${TRANSACTION_POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${TRANSACTION_POSTGRES_PASSWORD}
      - RABBITMQ_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@${RABBITMQ_HOST}:5672/
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://${EUREKA_HOST}:8761/eureka
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - financier-net

  # --- Add other services (budget, reporting, notification) here in a similar fashion ---

#----------------------------------------------------#
  #  FRONTEND SERVICE
  #----------------------------------------------------#
  # web-app:
  #   build:
  #     context: ./apps/web
  #   container_name: web-app
  #   ports:
  #     - "3000:80"
  #   depends_on:
  #     - api-gateway
  #   networks:
  #     - financier-net

#----------------------------------------------------#
#  VOLUMES & NETWORKS
#----------------------------------------------------#
volumes:
  user-db-data:
  transaction-db-data:

networks:
  financier-net:
    driver: bridge
