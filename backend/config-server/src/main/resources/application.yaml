server:
  port: 8071

spring:
  application:
    name: config-server
  profiles:
#    active: native
    active: git
  cloud:
    config:
      server:
#        native:
#          search-locations: classpath:/config
#          search-locations: file:///C://Config
        git:
          uri: https://github.com/anurag-babal/financier-config.git
          timeout: 5
          force-pull: true
          clone-on-start: true
          default-label: master

management:
  endpoints:
    web:
      exposure:
        include: "*"
  health:
    readiness-state:
      enabled: true
    liveness-state:
      enabled: true
  endpoint:
    health:
      probes:
        enabled: true
