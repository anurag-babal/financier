services:
  frontend:
    image: "anuragbabal/financier-frontend:latest"
    container_name: financier-frontend
    ports:
      - "80:3000"
    extends:
      file: common-config.yaml
      service: network-deploy-service

  config-server:
    image: "anuragbabal/financier-config-server:latest"
    container_name: config-server
    ports:
      - "8071:8071"
    healthcheck:
      test: "wget -qO- http://localhost:8071/actuator/health/readiness | grep UP || exit 1"
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    environment:
      - SPRING_APPLICATION_NAME=config-server
    extends:
      file: common-config.yaml
      service: microservice-base-config

  discovery-server:
    image: "anuragbabal/financier-discovery-server:latest"
    container_name: discovery-server
    ports:
      - "8070:8070"
    healthcheck:
      test: "wget -qO- http://localhost:8070/actuator/health/readiness | grep UP || exit 1"
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    environment:
      - SPRING_APPLICATION_NAME=discovery-server
    depends_on:
      config-server:
        condition: service_healthy
    extends:
      file: common-config.yaml
      service: microservice-config-server-config

  gateway-server:
    image: "anuragbabal/financier-gateway-server:latest"
    container_name: gateway-server
    ports:
      - "8072:8072"
    environment:
      - SPRING_APPLICATION_NAME=gateway-server
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    extends:
      file: common-config.yaml
      service: microservice-discovery-server-config

  auth-service:
    image: "anuragbabal/financier-auth-service:latest"
    container_name: auth-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_APPLICATION_NAME=auth-service
      - SPRING_DATASOURCE_URL=jdbc:mysql://auth-db:3306/financier_auth_db
    depends_on:
      config-server:
        condition: service_healthy
      auth-db:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    extends:
      file: common-config.yaml
      service: microservice-discovery-server-config

  expense-service:
    image: "anuragbabal/financier-expense-service:latest"
    container_name: expense-service
    ports:
      - "8084:8084"
    environment:
      - SPRING_APPLICATION_NAME=expense-service
      - SPRING_DATASOURCE_URL=jdbc:mysql://expense-db:3306/financier_expense_db
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      expense-db:
        condition: service_healthy
    extends:
      file: common-config.yaml
      service: microservice-discovery-server-config

  user-service:
    image: "anuragbabal/financier-user-service:latest"
    container_name: user-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_APPLICATION_NAME=user-service
      - SPRING_DATASOURCE_URL=jdbc:mysql://user-db:3306/financier_user_db
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      user-db:
        condition: service_healthy
    extends:
      file: common-config.yaml
      service: microservice-discovery-server-config

  report-service:
    image: "anuragbabal/financier-report-service:latest"
    container_name: report-service
    ports:
      - "8085:8085"
    environment:
      - SPRING_APPLICATION_NAME=report-service
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    extends:
      file: common-config.yaml
      service: microservice-discovery-server-config

  auth-db:
    image: "mysql:8.0"
    container_name: auth-db
    ports:
      - "3307:3306"
    healthcheck:
      test: [ "CMD", "mysqladmin" ,"ping", "-h", "localhost" ]
      timeout: 3s
      retries: 10
      interval: 10s
      start_period: 10s
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: financier_auth_db
    extends:
      file: common-config.yaml
      service: network-deploy-service

  expense-db:
    image: "mysql:8.0"
    container_name: expense-db
    ports:
      - "3308:3306"
    healthcheck:
      test: [ "CMD", "mysqladmin" ,"ping", "-h", "localhost" ]
      timeout: 3s
      retries: 10
      interval: 10s
      start_period: 10s
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: financier_expense_db
    extends:
      file: common-config.yaml
      service: network-deploy-service

  user-db:
    image: "mysql:8.0"
    container_name: user-db
    ports:
      - "3309:3306"
    healthcheck:
      test: [ "CMD", "mysqladmin" ,"ping", "-h", "localhost" ]
      timeout: 3s
      retries: 10
      interval: 10s
      start_period: 10s
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: financier_user_db
    extends:
      file: common-config.yaml
      service: network-deploy-service

  read:
    image: grafana/loki:3.0.0
    command: "-config.file=/etc/loki/config.yaml -target=read"
    ports:
      - 3101:3100
      - 7946
      - 9095
    volumes:
      - ../observability/loki/loki-config.yaml:/etc/loki/config.yaml
    depends_on:
      - minio
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: &loki-dns
      financier:
        aliases:
          - loki

  write:
    image: grafana/loki:3.0.0
    command: "-config.file=/etc/loki/config.yaml -target=write"
    ports:
      - 3102:3100
      - 7946
      - 9095
    volumes:
      - ../observability/loki/loki-config.yaml:/etc/loki/config.yaml
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      - minio
    networks:
      <<: *loki-dns

  alloy:
    image: grafana/alloy:latest
    volumes:
      - ../observability/alloy/alloy-local-config.yaml:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: run --server.http.listen-addr=0.0.0.0:12345 --storage.path=/var/lib/alloy/data /etc/alloy/config.alloy
    ports:
      - 12345:12345
    depends_on:
      - gateway
    extends:
      file: common-config.yaml
      service: network-deploy-service

  minio:
    image: minio/minio
    entrypoint:
      - sh
      - -euc
      - |
        mkdir -p /data/loki-data && \
        mkdir -p /data/loki-ruler && \
        minio server /data
    environment:
      - MINIO_ROOT_USER=loki
      - MINIO_ROOT_PASSWORD=supersecret
      - MINIO_PROMETHEUS_AUTH_TYPE=public
      - MINIO_UPDATE=off
    ports:
      - 9000
    volumes:
      - ./.data/minio:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 15s
      timeout: 20s
      retries: 5
    extends:
      file: common-config.yaml
      service: network-deploy-service

  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    depends_on:
      - gateway
    entrypoint:
      - sh
      - -euc
      - |
        mkdir -p /etc/grafana/provisioning/datasources
        cat <<EOF > /etc/grafana/provisioning/datasources/ds.yaml
        apiVersion: 1
        datasources:
          - name: Loki
            type: loki
            access: proxy
            url: http://gateway:3100
            jsonData:
              httpHeaderName1: "X-Scope-OrgID"
            secureJsonData:
              httpHeaderValue1: "tenant1"
        EOF
        /run.sh
    ports:
      - "3000:3000"
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    extends:
      file: common-config.yaml
      service: network-deploy-service

  backend:
    image: grafana/loki:3.0.0
    volumes:
      - ../observability/loki/loki-config.yaml:/etc/loki/config.yaml
    ports:
      - "3100"
      - "7946"
    command: "-config.file=/etc/loki/config.yaml -target=backend -legacy-read-mode=false"
    depends_on:
      - gateway
    extends:
      file: common-config.yaml
      service: network-deploy-service

  gateway:
    image: nginx:latest
    depends_on:
      - read
      - write
    entrypoint:
      - sh
      - -euc
      - |
        cat <<EOF > /etc/nginx/nginx.conf
        user  nginx;
        worker_processes  5;  ## Default: 1

        events {
          worker_connections   1000;
        }

        http {
          resolver 127.0.0.11;

          server {
            listen             3100;

            location = / {
              return 200 'OK';
              auth_basic off;
            }

            location = /api/prom/push {
              proxy_pass       http://write:3100\$$request_uri;
            }

            location = /api/prom/tail {
              proxy_pass       http://read:3100\$$request_uri;
              proxy_set_header Upgrade \$$http_upgrade;
              proxy_set_header Connection "upgrade";
            }

            location ~ /api/prom/.* {
              proxy_pass       http://read:3100\$$request_uri;
            }

            location = /loki/api/v1/push {
              proxy_pass       http://write:3100\$$request_uri;
            }

            location = /loki/api/v1/tail {
              proxy_pass       http://read:3100\$$request_uri;
              proxy_set_header Upgrade \$$http_upgrade;
              proxy_set_header Connection "upgrade";
            }

            location ~ /loki/api/.* {
              proxy_pass       http://read:3100\$$request_uri;
            }
          }
        }
        EOF
        /docker-entrypoint.sh nginx -g "daemon off;"
    ports:
      - "3100:3100"
    healthcheck:
      test: [ "CMD", "service", "nginx", "status" ]
      interval: 10s
      timeout: 5s
      retries: 5
    extends:
      file: common-config.yaml
      service: network-deploy-service

networks:
  financier:
    driver: bridge