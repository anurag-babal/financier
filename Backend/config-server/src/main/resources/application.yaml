server:
  port: 8071

spring:
  application:
    name: config-server
  profiles:
#    active: native
    active: git
  cloud:
    config:
      server:
#        native:
#          search-locations: classpath:/config
#          search-locations: file:///C://Config
        git:
          uri: https://github.com/anurag-babal/financier-config.git
          timeout: 5
          force-pull: true
          clone-on-start: true
          default-label: master

encrypt:
  key: yTUohIAB1jYe8uahW9GM4ABvomF3RE3djS0bQLKu9xpl3uUaFZwNh00DbQ1ZzYp2

management:
  endpoints:
    web:
      exposure:
        include: "*"
  health:
    readinessstate:
      enabled: true
    livenessstate:
      enabled: true
  endpoint:
    health:
      probes:
        enabled: true
